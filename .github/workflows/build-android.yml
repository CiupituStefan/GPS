name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1" "platforms;android-36" "build-tools;36.0.0"

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Bundle JavaScript for Android
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.ts \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug -x lint
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gps-tracker-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: GPS Tracker v1.0.0 (Build #${{ github.run_number }})
          body: |
            ## GPS Tracker - Android APK

            Automated debug build from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            **How to install:**
            1. Download `app-debug.apk` below
            2. Transfer to your Android phone
            3. Open the file and allow "Install from unknown sources" if prompted
            4. Done!
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
